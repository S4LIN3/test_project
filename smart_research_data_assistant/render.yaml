services:
  - type: web
    name: smart-research-data-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: VECTOR_DB
        value: faiss

